<!DOCTYPE html>
<html lang="ja">
<head>
<script>
window.MathJax = {
  tex: {
    inlineMath: [['$', '$'], ['\\(', '\\)']]
  }
};
</script>

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>なつ強化問題ビューア</title>
<style>
body {
  font-family: sans-serif;
  padding: 15px;
  font-size: 22px;
  max-width: 800px;
  margin: auto;
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header img {
  width: 85px;
  height: 60px;
}
.box {
  border: 1px solid #ccc;
  padding: 15px;
  margin-bottom: 10px;
}

#questionInfo {
  font-size: 14px;
  color: gray;
  margin-bottom: 10px;
}

#questionText {
  font-size: 28px;
  font-weight: bold;
  margin-bottom: 15px;
}

#questionLatex {
  font-size: 32px;
  margin-bottom: 20px;
}

#questionFigure {
  font-size: 24px;
  margin-bottom: 20px;
}

#answerBox {
  font-size: 28px;
  margin-top: 20px;
}

button {
  width: 100%;
  height: 60px;
  font-size: 24px;
  margin-top: 10px;
}
</style>
</head>
<body>

<div class="header">
  <h2>なつ強化問題</h2>
  <img src="icon.jpg" alt="アイコン">
</div>

<div class="box">
  <div id="questionInfo"></div>
  <div id="questionText"></div>
  <div id="questionLatex"></div>
  <div id="questionFigure"></div>
  
  
  <button onclick="showAnswer()">解答表示</button>
  <button onclick="nextQuestion()">次へ</button>

  <div id="answerBox" class="answer"></div>
</div>

<script>
// ============================================= Script ==================================================
// ===== LocalStregeデータ =====
const solved = JSON.parse(lokacStorage.getItem("solved")) || [];
// ===== JSONデータ =====
let questions = [];
let index = 0;

// ===== loadQuestions =====
async function loadQuestions() {
  const response = await fetch("./data/questions.json");
  questions = await response.json();
  // enabled=falseを除外
  questions = questions.filter(q => q.enabled);
  render();
}

loadQuestions();


// ===== 表示関数 =====
function render() {
  const q = questions[index];
  document.getElementById("questionInfo").innerText =
    `${index + 1} / ${questions.length}
     ID:${q.id}
     難易度:${q.difficulty}
     解答済み:${solved.length}`;
  document.getElementById("questionText").innerText = q.question.text;

  document.getElementById("questionLatex").innerHTML =
    q.question.latex ? `\\(${q.question.latex}\\)` : "";

  document.getElementById("questionFigure").innerText =
    q.question.figure
      ? `図形: 底辺=${q.question.figure.base}, 高さ=${q.question.figure.height}`
      : "";

  document.getElementById("answerBox").style.display = "none";
  document.getElementById("answerBox").innerText = "";
  // DOM更新後に一括レンダリング
  MathJax.typesetPromise();
}
  
// ===== 解答表示 =====
function showAnswer() {
  const q = questions[index];
  const box = document.getElementById("answerBox");

  box.style.display = "block";
  box.innerHTML = `
  ${q.answer.latex ? `解答: \\(${q.answer.latex}\\)<br>` : ""}
  ${q.answer.text ? `答え: ${q.answer.text}` : ""}
　`;
  solved.push(q.id);
  localStrage.setItem("solved",JSON.stringify(solved));
  MathJax.typesetPromise();
}
  
// ===== 次へ =====
function nextQuestion() {

  let next;

  do {
    next = Math.floor(
      Math.random() * questions.length
    );
  } while (
    questions.length > 1 &&
    next === index
  );

  index = next;

  render();
}

// 初期表示
loadQuestions();
</script>

</body>
</html>
