<!DOCTYPE html>
<html lang="ja">
  <head>
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']]
        }
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>なつ強化問題ビューア</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="header">
      <h2>なつ強化問題</h2>
      <img src="icon.jpg" alt="アイコン">
    </div>
    <div class="box">
      <div id="questionInfo"></div>
      <div id="questionText"></div>
      <div id="questionLatex"></div>
      <div id="questionFigure"></div>
      <button onclick="showAnswer(currentQuestion)">解答表示</button>
      <button onclick="nextQuestion()">次へ</button>
      <div id="answerBox" class="answer"></div>
    </div>
  </body>
</html>
