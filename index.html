<!DOCTYPE html>
<html lang="ja">
<head>
<script>
window.MathJax = {
  tex: {
    inlineMath: [['$', '$'], ['\\(', '\\)']]
  }
};
</script>

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<meta charset="UTF-8">
<title>問題ビューア</title>
<style>
  body { font-family: sans-serif; padding: 20px; }
  .box { border: 1px solid #ccc; padding: 15px; margin-bottom: 10px; }
  .answer { display: none; color: blue; margin-top: 10px; }
</style>
</head>
<body>

<h2>問題</h2>

<div class="box">
  <div id="questionText"></div>
  <div id="questionLatex"></div>
  <div id="questionFigure"></div>

  <button onclick="showAnswer()">解答表示</button>
  <button onclick="nextQuestion()">次へ</button>

  <div id="answerBox" class="answer"></div>
</div>

<script>
// ===== JSONデータ =====
const questions = [
  {
    id: "000001",
    question: { text: "因数分解しなさい", latex: "x^2+5x+6" },
    answer: { latex: "(x+2)(x+3)" }
  },
  {
    id: "000002",
    question: { text: "次を簡単にしなさい", latex: "\\sqrt{75}" },
    answer: { latex: "5\\sqrt{3}" }
  },
  {
    id: "000003",
    question: { text: "三角形の面積を求めなさい", figure: { base: 8, height: 5 } },
    answer: { latex: "20" }
  }
];

let index = 0;

// ===== 表示関数 =====
function render() {
  const q = questions[index];

  document.getElementById("questionText").innerText = q.question.text;

  document.getElementById("questionLatex").innerHTML =
    q.question.latex ? `\\(${q.question.latex}\\)` : "";

  document.getElementById("questionFigure").innerText =
    q.question.figure
      ? `図形: 底辺=${q.question.figure.base}, 高さ=${q.question.figure.height}`
      : "";

  document.getElementById("answerBox").style.display = "none";
  document.getElementById("answerBox").innerText = "";

  // DOM更新後に一括レンダリング
  MathJax.typesetPromise();
}
// ===== 解答表示 =====
function showAnswer() {
  const q = questions[index];
  const box = document.getElementById("answerBox");

  box.style.display = "block";
  box.innerHTML = "解答: \\(" + q.answer.latex + "\\)";

  MathJax.typesetPromise();
}// ===== 次へ =====
function nextQuestion() {
  index++;
  if (index >= questions.length) index = 0; // ループ
  render();
}

// 初期表示
render();
</script>

</body>
</html>
